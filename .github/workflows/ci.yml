name: CI and publish
on:
  push:
  pull_request:
  release:
    types: [published]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - if: github.event_name == 'release'
        run: cargo publish --token "$CRATES_IO_API_KEY"
        env:
          CRATES_IO_API_KEY: ${{ secrets.CRATES_IO_API_KEY }}
